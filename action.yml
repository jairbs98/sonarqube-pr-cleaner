name: "SonarQube PR Cleaner"
description: "Elimina proyectos temporales de SonarQube al cerrar un PR"
inputs:
  sonar_url:
    description: "URL del servidor SonarQube"
    required: true
  sonar_token:
    description: "Token de administración"
    required: true
  project_key:
    description: "Llave del proyecto a eliminar"
    required: true
runs:
  using: "node24"
  main: "dist/index.js"
